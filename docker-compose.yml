services:
  api:
    build: .
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - DATABASE_URL=sqlite://data/platform.db
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-}
      - DEFAULT_MODEL=${DEFAULT_MODEL:-gpt-4o}
      - DEFAULT_PROVIDER=${DEFAULT_PROVIDER:-openai}
    volumes:
      - api-data:/app/data
      - skills-cache:/home/app/.agent-core/skills
    restart: unless-stopped

volumes:
  api-data:
  skills-cache:
