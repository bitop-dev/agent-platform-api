name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./... -count=1 -timeout=120s -v
        env:
          JWT_SECRET: ci-test-secret-key-minimum-32-chars
          ENCRYPTION_KEY: ci-test-encrypt-key-32-chars-ok!

      - name: Vet
        run: go vet ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m

  sqlc-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: sqlc-dev/setup-sqlc@v4
        with:
          sqlc-version: "1.28.0"

      - name: Verify sqlc is up to date
        run: |
          sqlc generate
          git diff --exit-code internal/db/sqlc/
